<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 570" width="490" height="570">
  <style>
    :root {
      --bg: #0d1117;
      --border: #30363d;
      --title-bar: #161b22;
      --title-text: #8b949e;
      --text: #c9d1d9;
      --prompt: #58a6ff;
      --label: #7ee787;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d0d7de;
        --title-bar: #f6f8fa;
        --title-text: #57606a;
        --text: #24292f;
        --prompt: #0969da;
        --label: #1a7f37;
      }
    }
    .terminal {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
    }
    .title-bar {
      fill: var(--title-bar);
      stroke: var(--border);
      stroke-width: 1.5;
    }
    .title-text {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Consolas, monospace;
      font-size: 13px;
      font-weight: 600;
      fill: var(--title-text);
    }
    text.terminal-text {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Consolas, monospace;
      font-size: 12px;
      fill: var(--text);
    }
    .prompt-text { fill: var(--prompt); font-weight: bold; }
    .label-text { fill: var(--label); font-weight: bold; }
    @keyframes fadeInSlide {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .line {
      opacity: 0;
      animation: fadeInSlide 0.4s ease-out forwards;
    }
    .line-0 { animation-delay: 0.10s; }
    .line-1 { animation-delay: 0.15s; }
    .line-2 { animation-delay: 0.20s; }
    .line-3 { animation-delay: 0.25s; }
    .line-4 { animation-delay: 0.30s; }
    .line-5 { animation-delay: 0.35s; }
    .line-6 { animation-delay: 0.40s; }
    .line-7 { animation-delay: 0.45s; }
    .line-8 { animation-delay: 0.50s; }
    .line-9 { animation-delay: 0.55s; }
    .line-10 { animation-delay: 0.60s; }
    .line-11 { animation-delay: 0.65s; }
    .line-12 { animation-delay: 0.70s; }
    .line-13 { animation-delay: 0.75s; }
    .line-14 { animation-delay: 0.80s; }
  </style>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15" />
  </filter>
  <rect class="terminal" x="10" y="10" width="470" height="550" rx="8" ry="8" filter="url(#shadow)" />
  <path class="title-bar" d="M 10,18 A 8,8 0 0,1 18,10 L 472,10 A 8,8 0 0,1 480,18 L 480,42 L 10,42 Z" />
  <circle cx="28" cy="26" r="6" fill="#ff5f56" />
  <circle cx="48" cy="26" r="6" fill="#ffbd2e" />
  <circle cx="68" cy="26" r="6" fill="#27c93f" />
